name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Variables factices pour que le build passe en CI
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: placeholder_vapid_public
          VAPID_PRIVATE_KEY: placeholder_vapid_private
          VAPID_CONTACT_EMAIL: noreply@evaq.app

  test-edge-functions:
    name: Edge Functions (Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check Edge Functions
        run: |
          deno check supabase/functions/ingest-gdacs/index.ts
          deno check supabase/functions/calc-defcon/index.ts
          deno check supabase/functions/send-push/index.ts
